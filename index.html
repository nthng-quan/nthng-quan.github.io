<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Inspector</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar">
            <div class="upload-section">
                <h3>Load Invoices</h3>
                <div id="drop-zone" class="drop-zone">
                    <span>Drop XML files here</span>
                    <input type="file" id="file-input" multiple accept=".xml" hidden>
                    <div class="upload-actions">
                        <button id="upload-btn" class="upload-btn">Select Files</button>
                        <button id="clear-btn" class="upload-btn secondary">Clear All</button>
                    </div>
                </div>
            </div>
            <nav class="invoice-nav">
                <div class="search-container">
                    <input type="text" placeholder="Search Invoices..." id="search">
                </div>
                <h3>Loaded Invoices</h3>
                <ul id="invoice-list">
                    <!-- Files will appear here -->
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <section id="detail-view" class="detail-container empty">
                <div class="empty-state">
                    <div class="icon-pulse">📁</div>
                    <h2>Select an invoice to inspect</h2>
                    <p>Select a file from the sidebar to view detailed line items and verification data.</p>
                </div>
            </section>
        </main>
    </div>

    <template id="invoice-detail-template">
        <div class="invoice-detail">
            <div class="detail-header">
                <div class="title-meta">
                    <h2 id="det-filename">filename.xml</h2>
                    <div class="meta-pills">
                        <span id="det-inv-num" class="pill magenta"># INV-123</span>
                        <span id="det-hotel-id" class="pill green">Hotel: 12345</span>
                        <span id="det-status-pill" class="pill status-pill">Valid</span>
                        <button id="det-export-btn" class="pill export-btn">Export XML</button>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="stat">
                        <label>Original</label>
                        <div id="det-original-total" class="value original-sum">--</div>
                    </div>
                    <div class="stat">
                        <label>Invoice Total</label>
                        <div id="det-total" class="value">0.00 EUR</div>
                    </div>
                    <div class="stat">
                        <label>Delta</label>
                        <div id="det-delta" class="value delta">--</div>
                    </div>
                </div>
            </div>

            <div class="totals-dashboard fade-in">
                <h3>RECONCILIATION SUMMARY (TOTALS)</h3>
                <table>
                    <thead>
                        <tr>
                            <th>COMPONENT</th>
                            <th class="right">ORIGINAL SUM</th>
                            <th class="right">RECONCILED SUM</th>
                            <th class="right">TARGET (INVOICE)</th>
                            <th class="right">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="det-totals-body">
                        <!-- Summary rows added by JS -->
                    </tbody>
                </table>
            </div>

            <div class="table-container fade-in">
                <table>
                    <thead>
                        <tr>
                            <th>POS #</th>
                            <th>DESCRIPTION</th>
                            <th class="right">TAX %</th>
                            <th class="right">NET</th>
                            <th class="right">TAX</th>
                            <th class="right">GROSS</th>
                        </tr>
                    </thead>
                    <tbody id="det-items">
                        <!-- Items here -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
